<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Kushal Shortener</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white h-screen flex items-center justify-center">

    <div class="w-full max-w-md bg-gray-900 p-8 rounded-2xl shadow-2xl border border-gray-800">
        <h2 class="text-3xl font-bold text-center mb-6 text-blue-500">Welcome Back</h2>
        
        <form action="/login" method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-400">Email Address</label>
                <input type="email" name="email" required 
                    class="w-full mt-1 p-3 bg-gray-800 border border-gray-700 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-400">Password</label>
                <input type="password" name="password" required 
                    class="w-full mt-1 p-3 bg-gray-800 border border-gray-700 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <button type="submit" 
                class="w-full py-3 bg-blue-600 hover:bg-blue-500 transition-all rounded-lg font-bold text-white mt-4">
                Login
            </button>
        </form>

        <p class="text-center text-gray-500 mt-6 text-sm">
            Don't have an account? 
            <a href="/register" class="text-blue-400 hover:underline">Register here</a>
        </p>
    </div>

</body>
</html>
