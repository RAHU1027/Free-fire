<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Kushal Shortener</title>
    <!-- Tailwind CSS for Professional Look -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen flex items-center justify-center p-4">

    <!-- Card Container -->
    <div class="w-full max-w-sm bg-slate-900 p-8 rounded-3xl shadow-2xl border border-slate-800">
        <!-- Heading -->
        <div class="text-center mb-8">
            <h2 class="text-3xl font-extrabold text-blue-500">Kushal</h2>
            <p class="text-slate-400 text-sm mt-2">Sign in to manage your links</p>
        </div>
        
        <!-- Login Form -->
        <form action="/login" method="POST" class="space-y-5">
            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-widest ml-1">Email</label>
                <input type="email" name="email" required placeholder="kushal@example.com"
                    class="w-full mt-2 p-3 bg-slate-800 border border-slate-700 rounded-xl focus:ring-2 focus:ring-blue-600 outline-none transition-all">
            </div>
            
            <div>
                <label class="block text-xs font-semibold text-slate-500 uppercase tracking-widest ml-1">Password</label>
                <input type="password" name="password" required placeholder="••••••••"
                    class="w-full mt-2 p-3 bg-slate-800 border border-slate-700 rounded-xl focus:ring-2 focus:ring-blue-600 outline-none transition-all">
            </div>

            <button type="submit" 
                class="w-full py-3.5 bg-blue-600 hover:bg-blue-500 active:scale-95 transition-all rounded-xl font-bold text-white shadow-lg shadow-blue-900/20 mt-4">
                Login Now
            </button>
        </form>

        <!-- Footer Link -->
        <div class="text-center mt-6">
            <p class="text-slate-500 text-sm">
                New user? 
                <a href="/register" class="text-blue-400 font-bold hover:text-blue-300 transition-colors">Create Account</a>
            </p>
        </div>
    </div>

</body>
</html>
