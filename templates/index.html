<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Kushal Store</title>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h2 class="text-center mb-4">Kushal Digital Store</h2>
        <div class="row">
            <!-- Google Play Column -->
            <div class="col-md-6">
                <h4>Google Play Codes</h4>
                {% for item in products.google_play %}
                <div class="card mb-2 p-3">{{ item.name }} - ₹{{ item.price }} <button class="btn btn-sm btn-primary">Buy</button></div>
                {% endfor %}
            </div>
            <!-- Gaming Column -->
            <div class="col-md-6">
                <h4>Gaming Items</h4>
                {% for item in products.gaming %}
                <div class="card mb-2 p-3">{{ item.name }} - ₹{{ item.price }} <button class="btn btn-sm btn-success">Buy</button></div>
                {% endfor %}
            </div>
        </div>
    </div>
</body>
</html>
