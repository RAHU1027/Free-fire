<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Kushal Shortner</title>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center h-screen">
    <div class="bg-gray-800 p-8 rounded-xl shadow-lg w-96">
        <h1 class="text-2xl font-bold mb-4 text-center">Kushal Shortener</h1>
        <form method="POST">
            <input type="url" name="url" placeholder="Paste link here..." class="w-full p-2 mb-4 rounded bg-gray-700 text-white">
            <button class="w-full bg-blue-600 hover:bg-blue-500 p-2 rounded font-bold">Shorten Link</button>
        </form>
    </div>
</body>
</html>
