<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #ffffff; font-family: sans-serif; }
        .card { background-color: #1e1e1e; border-radius: 20px; border: none; margin-bottom: 12px; padding: 15px; }
        .item-icon { width: 55px; height: 55px; object-fit: cover; border-radius: 50%; }
        .btn-price { background-color: #0d6efd; color: white; border-radius: 25px; padding: 8px 20px; font-weight: bold; border: none; }
        .tag-instant { color: #ffc107; font-size: 0.8rem; font-weight: bold; }
        .tag-popular { color: #fd7e14; font-size: 0.8rem; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container mt-4">
        <h4 class="mb-4">Store Menu</h4>
        {% for item in products %}
        <div class="card d-flex flex-row align-items-center justify-content-between">
            <div class="d-flex align-items-center">
                <img src="{{ url_for('static', filename='images/' + item.image) }}" class="item-icon me-3">
                <div>
                    <div style="font-weight: bold; font-size: 1.1rem;">{{ item.name }}</div>
                    <div class="text-secondary" style="font-size: 0.8rem;">{{ item.desc }}</div>
                    <div class="{{ 'tag-instant' if item.tag == 'instant' else 'tag-popular' }}">
                        ⚡ {{ item.tag | upper }}
                    </div>
                </div>
            </div>
            <button class="btn-price">₹ {{ item.price }}</button>
        </div>
        {% endfor %}
    </div>
</body>
</html>
