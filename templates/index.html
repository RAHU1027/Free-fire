<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; padding: 10px; }
        .product-card { background-color: #2c2c2c; border-radius: 10px; padding: 10px; text-align: center; }
        .product-img { width: 100%; height: 120px; object-fit: cover; border-radius: 8px; margin-bottom: 10px; }
        .product-name { font-size: 0.9rem; font-weight: bold; margin-bottom: 5px; height: 40px; overflow: hidden; }
        .tag { font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; background: #444; color: #ffcc00; display: inline-block; margin-bottom: 5px; }
        .buy-btn { background-color: #007bff; color: white; border: none; width: 100%; padding: 8px; border-radius: 5px; font-weight: bold; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="container mt-3">
        <h5 class="mb-3">Kushal's Digital Store</h5>
        <div class="grid-container">
            {% for item in products %}
            <div class="product-card">
                <img src="{{ url_for('static', filename='images/' + item.image) }}" class="product-img">
                <div class="product-name">{{ item.name }}</div>
                <div class="tag">{{ item.tag | upper }}</div>
                <button class="buy-btn">₹ {{ item.price }} - Buy Now</button>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
