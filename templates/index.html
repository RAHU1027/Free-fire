<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: white; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 15px; }
        .card { background-color: #1e1e1e; border-radius: 15px; border: none; overflow: hidden; padding: 10px; }
        .img-container { width: 100%; height: 120px; background-color: #333; border-radius: 10px; margin-bottom: 10px; overflow: hidden; }
        .product-img { width: 100%; height: 100%; object-fit: cover; }
        .title { font-size: 0.9rem; font-weight: bold; margin-bottom: 5px; }
        .buy-btn { background-color: #007bff; color: white; border: none; padding: 8px; border-radius: 8px; width: 100%; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h4 class="mt-3">Kushal's Store</h4>
        <div class="product-grid">
            {% for item in products %}
            <div class="card">
                <div class="img-container">
                    <img src="{{ url_for('static', filename='images/' + item.image) }}" class="product-img" onerror="this.src='https://via.placeholder.com/150'">
                </div>
                <div class="title">{{ item.name }}</div>
                <button class="buy-btn">₹ {{ item.price }} - Buy Now</button>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
