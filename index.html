<!-- Dashboard UI Snippet -->
<div class="max-w-4xl mx-auto p-6 bg-gray-900 rounded-lg shadow-xl mt-10 text-white">
    <h2 class="text-3xl font-bold mb-6 text-blue-500">Kushal Link Manager</h2>
    <form method="POST" class="flex gap-4 mb-8">
        <input type="url" name="url" required placeholder="Enter long URL..." class="flex-1 p-3 rounded bg-gray-800 border border-gray-700">
        <button class="bg-blue-600 px-6 py-3 rounded font-bold hover:bg-blue-500">Shorten</button>
    </form>
    
    <table class="w-full text-left">
        <thead><tr class="text-gray-400 border-b border-gray-700"><th>Short Link</th><th>Original URL</th></tr></thead>
        <tbody>
            {% for link in links %}
            <tr class="border-b border-gray-800">
                <td class="p-4 text-blue-400">yourdomain.com/{{ link.code }}</td>
                <td class="p-4 text-gray-300 truncate max-w-xs">{{ link.original }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
